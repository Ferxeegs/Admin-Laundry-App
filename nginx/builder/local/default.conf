server {
    listen 80;

    # Increase buffer sizes for better performance
    client_max_body_size 50M;
    client_body_buffer_size 128k;
    proxy_buffer_size 4k;
    proxy_buffers 4 32k;
    proxy_busy_buffers_size 64k;

    # 1. Frontend (Vite Dev Server)
    location / {
        proxy_pass http://frontend-dev:5173;
        proxy_http_version 1.1;
        
        # WebSocket support untuk HMR (Hot Module Replacement)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout settings untuk WebSocket
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Disable buffering untuk real-time updates
        proxy_buffering off;
    }
    
    # WebSocket endpoint untuk Vite HMR
    location /ws {
        proxy_pass http://frontend-dev:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # 2. Backend API
    location /api/v1/ {
        proxy_pass http://backend-dev:8000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # TAMBAHKAN INI: Agar Swagger tahu lokasi aslinya
        proxy_set_header X-Forwarded-Prefix /api/v1; 
    }

    # 3. Adminer
    location /qq/ {
        proxy_pass http://adminer:8080/;
        proxy_set_header Host $host;
    }
    
}