server {
    listen 80;
    server_name localhost;

    # Folder utama hasil build
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        
        # PENTING: Mengarahkan semua request ke index.html
        # Ini agar React Router bisa menangani navigasi (SPA)
        try_files $uri $uri/ /index.html;
    }

    # Optimasi Gzip (Mempercepat loading web)
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss text/javascript;
    gzip_vary on;

    # Caching untuk asset statis (image, fonts, css, js)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}